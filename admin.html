<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 — EK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500&family=Fira+Code:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080808;--bg1:#0f0f0f;--bg2:#141414;
  --text:#f0ede8;--sub:#5a5856;
  --accent:#b8ff57;--accent-dim:rgba(184,255,87,.1);
  --border:rgba(255,255,255,.06);--border-h:rgba(184,255,87,.22);
  --danger:#ff4444;--danger-dim:rgba(255,68,68,.1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;font-weight:300;min-height:100vh;}

#login{min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-card{width:380px;border:1px solid var(--border);background:var(--bg1);padding:3rem;}
.login-eye{font-family:'Fira Code',monospace;font-size:.62rem;color:var(--accent);letter-spacing:.2em;margin-bottom:.5rem;}
.login-eye::before{content:'// ';color:var(--sub);}
.login-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;letter-spacing:-.04em;margin-bottom:2.5rem;}

label{font-family:'Fira Code',monospace;font-size:.6rem;color:var(--sub);letter-spacing:.15em;display:block;margin-bottom:.5rem;}
input[type=text],input[type=password],input[type=url],input[type=date],textarea{
  width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);
  padding:.75rem 1rem;font-family:'Outfit',sans-serif;font-size:.85rem;font-weight:300;
  outline:none;transition:border-color .2s;margin-bottom:1.2rem;
}
input:focus,textarea:focus{border-color:var(--border-h);}
textarea{min-height:100px;resize:vertical;}
input[type=file]{background:none;border:none;padding:0;color:var(--sub);font-size:.8rem;margin-bottom:.8rem;width:100%;}

.btn{background:none;border:1px solid var(--border);color:var(--sub);padding:.75rem 1.5rem;
  font-family:'Fira Code',monospace;font-size:.62rem;letter-spacing:.12em;cursor:pointer;
  transition:all .2s;width:100%;position:relative;overflow:hidden;}
.btn::before{content:'';position:absolute;inset:0;background:var(--accent-dim);transform:translateX(-100%);transition:transform .3s;}
.btn:hover{color:var(--accent);border-color:var(--border-h);}
.btn:hover::before{transform:translateX(0);}
.btn span{position:relative;}
.btn-sm{padding:.4rem .8rem;font-size:.55rem;width:auto;}
.btn-danger{border-color:rgba(255,68,68,.2);color:#886655;}
.btn-danger:hover{color:var(--danger);border-color:rgba(255,68,68,.4);}
.btn-danger::before{background:var(--danger-dim);}
.btn-row{display:flex;gap:.8rem;}
.btn-row .btn{width:auto;padding:.75rem 1.2rem;}
.err{font-family:'Fira Code',monospace;font-size:.62rem;color:var(--danger);margin-top:-.8rem;margin-bottom:1rem;}

#admin{display:none;}
.admin-top{position:sticky;top:0;z-index:100;background:rgba(8,8,8,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;}
.admin-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:.9rem;letter-spacing:-.02em;color:var(--accent);padding:1.2rem 0;}
.tabs{display:flex;}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--sub);padding:1.2rem 1rem;font-family:'Fira Code',monospace;font-size:.6rem;letter-spacing:.1em;cursor:pointer;transition:all .2s;}
.tab:hover{color:var(--text);}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);}
.logout-btn{background:none;border:1px solid var(--border);color:var(--sub);padding:.4rem .9rem;font-family:'Fira Code',monospace;font-size:.55rem;letter-spacing:.1em;cursor:pointer;transition:all .2s;}
.logout-btn:hover{color:var(--danger);border-color:rgba(255,68,68,.3);}

.admin-wrap{max-width:900px;margin:0 auto;padding:3rem 2rem;}
.panel{display:none;}
.panel.on{display:block;}
.panel-hd{font-family:'Fira Code',monospace;font-size:.62rem;color:var(--accent);letter-spacing:.2em;margin-bottom:2rem;display:flex;align-items:center;gap:1rem;}
.panel-hd::before{content:'//';color:var(--sub);}
.panel-hd::after{content:'';flex:1;height:1px;background:var(--border);}
.form-box{border:1px solid var(--border);background:var(--bg1);padding:2rem;margin-bottom:2rem;}
.form-box-lbl{font-family:'Fira Code',monospace;font-size:.58rem;color:var(--sub);letter-spacing:.12em;margin-bottom:1.5rem;display:block;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}

.item{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--border);background:var(--bg1);padding:1.2rem 1.5rem;margin-bottom:1px;gap:1rem;transition:background .15s;}
.item:hover{background:var(--bg2);}
.item-l{flex:1;min-width:0;}
.item-name{font-size:.88rem;color:var(--text);margin-bottom:.2rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.item-sub{font-family:'Fira Code',monospace;font-size:.6rem;color:var(--sub);}
.item-actions{display:flex;gap:.5rem;flex-shrink:0;}
.item-thumb{width:72px;height:52px;object-fit:cover;border:1px solid var(--border);flex-shrink:0;background:var(--bg2);}
.item-thumb-ig{width:72px;height:52px;border:1px solid var(--border);flex-shrink:0;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-family:'Fira Code',monospace;font-size:.55rem;color:var(--accent);}

.preview-img{width:100%;max-height:200px;object-fit:cover;display:none;margin-bottom:1rem;border:1px solid var(--border);}

/* 인스타 미리보기 */
.insta-prev{display:none;margin-bottom:1.2rem;border:1px solid var(--border);background:var(--bg2);padding:1rem;}
.insta-prev iframe{width:100%;min-height:400px;border:none;max-width:400px;display:block;}

.guide{background:var(--bg2);border-left:2px solid var(--accent);padding:1rem 1.2rem;margin-bottom:1.5rem;}
.guide p{font-size:.78rem;color:var(--sub);line-height:1.8;}
.guide code{font-family:'Fira Code',monospace;font-size:.7rem;color:var(--accent);}

.range-wrap{display:flex;align-items:center;gap:1rem;margin-bottom:1.2rem;}
input[type=range]{flex:1;accent-color:var(--accent);}
.range-val{font-family:'Fira Code',monospace;font-size:.7rem;color:var(--accent);min-width:36px;text-align:right;}

.divider{border:none;border-top:1px solid var(--border);margin:2rem 0;}
.back{display:inline-block;color:var(--sub);text-decoration:none;font-family:'Fira Code',monospace;font-size:.62rem;letter-spacing:.1em;border:1px solid var(--border);padding:.5rem 1rem;transition:all .2s;}
.back:hover{color:var(--accent);border-color:var(--border-h);}
.empty-msg{font-family:'Fira Code',monospace;font-size:.65rem;color:var(--sub);padding:1.5rem 0;letter-spacing:.08em;}

.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border-h);color:var(--accent);padding:.7rem 1.4rem;font-family:'Fira Code',monospace;font-size:.62rem;letter-spacing:.1em;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div class="login-eye">admin access</div>
    <div class="login-title">관리자 패널</div>
    <label>비밀번호</label>
    <input type="password" id="pw" placeholder="••••••••">
    <div class="err" id="login-err" style="display:none">// 비밀번호가 틀렸어요</div>
    <button class="btn" onclick="login()"><span>입장 →</span></button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin">
  <div class="admin-top">
    <div class="admin-logo">EK / Admin</div>
    <div class="tabs">
      <button class="tab on" onclick="switchTab('about',this)">소개</button>
      <button class="tab" onclick="switchTab('projects',this)">프로젝트</button>
      <button class="tab" onclick="switchTab('skills',this)">기술</button>
      <button class="tab" onclick="switchTab('gallery',this)">갤러리</button>
      <button class="tab" onclick="switchTab('config',this)">설정</button>
    </div>
    <button class="logout-btn" onclick="logout()">로그아웃</button>
  </div>

  <div class="admin-wrap">

    <!-- ABOUT -->
    <div class="panel on" id="panel-about">
      <div class="panel-hd">소개 글</div>
      <div class="form-box">
        <span class="form-box-lbl">// 자기소개 — 줄바꿈으로 문단 구분</span>
        <label>자기소개 텍스트</label>
        <textarea id="about-text" placeholder="한국에서 백엔드 개발을 향해..."></textarea>
        <button class="btn" onclick="saveAbout()"><span>저장 →</span></button>
      </div>
    </div>

    <!-- PROJECTS -->
    <div class="panel" id="panel-projects">
      <div class="panel-hd">프로젝트 추가</div>
      <div class="form-box">
        <label>프로젝트 이름</label>
        <input type="text" id="pj-name" placeholder="응급의료 종합 시스템">
        <label>설명</label>
        <textarea id="pj-desc" placeholder="어떤 걸 만들었나요?" style="min-height:80px"></textarea>
        <label>태그 (쉼표로 구분)</label>
        <input type="text" id="pj-tags" placeholder="PHP, MySQL, API">
        <label>GitHub / 링크 (선택)</label>
        <input type="url" id="pj-link" placeholder="https://github.com/...">
        <button class="btn" onclick="addProject()"><span>프로젝트 추가 →</span></button>
      </div>
      <div class="panel-hd">등록된 프로젝트</div>
      <div id="pj-list"></div>
    </div>

    <!-- SKILLS -->
    <div class="panel" id="panel-skills">
      <div class="panel-hd">기술 추가</div>
      <div class="form-box">
        <div class="row2">
          <div><label>언어 / 프레임워크</label><input type="text" id="sk-name" placeholder="Python"></div>
          <div><label>숙련도 레벨</label><input type="text" id="sk-label" placeholder="중급"></div>
        </div>
        <label>숙련도 (%)</label>
        <div class="range-wrap">
          <input type="range" min="0" max="100" value="65" id="sk-level" oninput="document.getElementById('sk-val').textContent=this.value+'%'">
          <span class="range-val" id="sk-val">65%</span>
        </div>
        <button class="btn" onclick="addSkill()"><span>기술 추가 →</span></button>
      </div>
      <div class="panel-hd">등록된 기술</div>
      <div id="sk-list"></div>
    </div>

    <!-- GALLERY -->
    <div class="panel" id="panel-gallery">

      <!-- 직접 업로드 -->
      <div class="panel-hd">사진 직접 업로드</div>
      <div class="form-box">
        <label>이미지 파일</label>
        <input type="file" id="ph-file" accept="image/*" onchange="previewPh(this)">
        <img id="ph-preview" class="preview-img" alt="">
        <div class="row2">
          <div><label>촬영 장소</label><input type="text" id="ph-loc" placeholder="서울, 한국"></div>
          <div><label>촬영 날짜</label><input type="date" id="ph-date"></div>
        </div>
        <button class="btn" onclick="addPhoto()"><span>사진 추가 →</span></button>
      </div>

      <!-- 인스타 -->
      <div class="panel-hd">Instagram 게시물 추가</div>
      <div class="guide">
        <p>
          인스타 앱 → 게시물 → <strong style="color:var(--text)">공유 → 링크 복사</strong> 후 아래에 붙여넣으세요.<br>
          URL 형식: <code>https://www.instagram.com/p/게시물코드/</code><br>
          <strong style="color:var(--text)">공개 계정</strong>의 게시물만 임베드 표시가 돼요.
        </p>
      </div>
      <div class="form-box">
        <label>Instagram 게시물 URL</label>
        <input type="url" id="ig-url" placeholder="https://www.instagram.com/p/ABC123xyz/">
        <div class="insta-prev" id="ig-prev"></div>
        <div class="btn-row">
          <button class="btn" onclick="previewIG()"><span>미리보기 →</span></button>
          <button class="btn" onclick="addIG()"><span>갤러리에 추가 →</span></button>
        </div>
      </div>

      <!-- 등록된 목록 -->
      <div class="panel-hd">사진 목록</div>
      <div id="ph-list"></div>
      <div class="panel-hd" style="margin-top:2rem">Instagram 목록</div>
      <div id="ig-list"></div>
    </div>

    <!-- CONFIG -->
    <div class="panel" id="panel-config">
      <div class="panel-hd">소셜 링크</div>
      <div class="form-box">
        <label>GitHub URL</label>
        <input type="url" id="cfg-gh" placeholder="https://github.com/username">
        <label>Instagram 프로필 URL</label>
        <input type="url" id="cfg-ig" placeholder="https://instagram.com/username">
        <button class="btn" onclick="saveConfig()"><span>저장 →</span></button>
      </div>
      <div class="panel-hd">보안</div>
      <div class="form-box">
        <label>새 비밀번호</label>
        <input type="password" id="new-pw" placeholder="새 비밀번호">
        <label>확인</label>
        <input type="password" id="cfm-pw" placeholder="비밀번호 확인">
        <button class="btn btn-danger" onclick="changePw()"><span>비밀번호 변경 →</span></button>
      </div>
      <hr class="divider">
      <a href="index.html" class="back">← 포트폴리오 보기</a>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// AUTH
const DEF='admin123';
function getPw(){return localStorage.getItem('admin_pw')||DEF;}
function login(){
  if(document.getElementById('pw').value===getPw()){
    document.getElementById('login').style.display='none';
    document.getElementById('admin').style.display='block';
    loadAll();
  }else{document.getElementById('login-err').style.display='block';}
}
function logout(){
  document.getElementById('admin').style.display='none';
  document.getElementById('login').style.display='flex';
  document.getElementById('pw').value='';
}
function changePw(){
  const a=document.getElementById('new-pw').value,b=document.getElementById('cfm-pw').value;
  if(!a)return toast('// 새 비밀번호를 입력해주세요');
  if(a!==b)return toast('// 비밀번호가 일치하지 않아요');
  localStorage.setItem('admin_pw',a);
  document.getElementById('new-pw').value='';document.getElementById('cfm-pw').value='';
  toast('// 비밀번호가 변경됐어요');
}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')login();});

function load(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v));}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function switchTab(name,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('panel-'+name).classList.add('on');
  btn.classList.add('on');
}

// ABOUT
function loadAbout(){const cfg=load('config',{});if(cfg.aboutText)document.getElementById('about-text').value=cfg.aboutText;}
function saveAbout(){const cfg=load('config',{});cfg.aboutText=document.getElementById('about-text').value;save('config',cfg);toast('// 소개 글이 저장됐어요');}

// PROJECTS
const PJ_DEF=[
  {name:'응급의료 종합 시스템',desc:'구급차-병원 매칭 플랫폼 — PHP + MySQL 백엔드로 이송 시간 단축 및 생존율 향상.',tags:['PHP','MySQL','Database','API'],link:''},
  {name:'고등학교 시간표 앱',desc:'실제로 쓰려고 만든 시간표 앱. 학교 과제가 아닌 실용 목적의 프로덕트.',tags:['App Inventor','PHP','SQL'],link:''},
  {name:'데이터 보안 암호화 시스템',desc:'AES_ENCRYPT + HEX 기반 민감 정보 암호화 파이프라인.',tags:['PHP','MySQL','Security'],link:''},
];
function renderProjects(){
  const list=load('projects',PJ_DEF);
  const el=document.getElementById('pj-list');
  if(!list.length){el.innerHTML='<div class="empty-msg">// 등록된 프로젝트가 없어요</div>';return;}
  el.innerHTML=list.map((p,i)=>`
    <div class="item">
      <div class="item-l"><div class="item-name">${p.name}</div><div class="item-sub">${p.tags.join(' · ')}</div></div>
      <div class="item-actions"><button class="btn btn-danger btn-sm" onclick="delProject(${i})"><span>삭제</span></button></div>
    </div>`).join('');
}
function addProject(){
  const name=document.getElementById('pj-name').value.trim();
  if(!name)return toast('// 프로젝트 이름을 입력해주세요');
  const list=load('projects',PJ_DEF);
  list.unshift({name,desc:document.getElementById('pj-desc').value.trim(),tags:document.getElementById('pj-tags').value.split(',').map(t=>t.trim()).filter(Boolean),link:document.getElementById('pj-link').value.trim()});
  save('projects',list);
  ['pj-name','pj-desc','pj-tags','pj-link'].forEach(id=>document.getElementById(id).value='');
  renderProjects();toast('// 프로젝트가 추가됐어요');
}
function delProject(i){if(!confirm('삭제할까요?'))return;const list=load('projects',PJ_DEF);list.splice(i,1);save('projects',list);renderProjects();toast('// 삭제됐어요');}

// SKILLS
const SK_DEF=[{name:'Python',level:65,label:'중급'},{name:'C',level:55,label:'중급'},{name:'SQL',level:70,label:'중급'},{name:'PHP',level:60,label:'중급'}];
function renderSkills(){
  const list=load('skills',SK_DEF);
  const el=document.getElementById('sk-list');
  if(!list.length){el.innerHTML='<div class="empty-msg">// 등록된 기술이 없어요</div>';return;}
  el.innerHTML=list.map((s,i)=>`
    <div class="item">
      <div class="item-l"><div class="item-name">${s.name}</div><div class="item-sub">${s.label} — ${s.level}%</div></div>
      <div class="item-actions"><button class="btn btn-danger btn-sm" onclick="delSkill(${i})"><span>삭제</span></button></div>
    </div>`).join('');
}
function addSkill(){
  const name=document.getElementById('sk-name').value.trim();
  if(!name)return toast('// 기술 이름을 입력해주세요');
  const list=load('skills',SK_DEF);
  list.push({name,level:parseInt(document.getElementById('sk-level').value),label:document.getElementById('sk-label').value.trim()||'중급'});
  save('skills',list);
  document.getElementById('sk-name').value='';document.getElementById('sk-label').value='';
  document.getElementById('sk-level').value=65;document.getElementById('sk-val').textContent='65%';
  renderSkills();toast('// 기술이 추가됐어요');
}
function delSkill(i){if(!confirm('삭제할까요?'))return;const list=load('skills',SK_DEF);list.splice(i,1);save('skills',list);renderSkills();toast('// 삭제됐어요');}

// PHOTOS (직접 업로드)
let pDataURL=null;
function previewPh(input){const f=input.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{pDataURL=e.target.result;const p=document.getElementById('ph-preview');p.src=pDataURL;p.style.display='block';};r.readAsDataURL(f);}
function renderPhotos(){
  const list=load('photos',[]);
  const el=document.getElementById('ph-list');
  if(!list.length){el.innerHTML='<div class="empty-msg">// 등록된 사진이 없어요</div>';return;}
  el.innerHTML=list.map((p,i)=>`
    <div class="item">
      <img src="${p.src}" class="item-thumb" alt="">
      <div class="item-l"><div class="item-name">${p.location}</div><div class="item-sub">${p.date}</div></div>
      <div class="item-actions"><button class="btn btn-danger btn-sm" onclick="delPhoto(${i})"><span>삭제</span></button></div>
    </div>`).join('');
}
function addPhoto(){
  if(!pDataURL)return toast('// 이미지를 선택해주세요');
  const loc=document.getElementById('ph-loc').value.trim();
  const date=document.getElementById('ph-date').value;
  if(!loc)return toast('// 장소를 입력해주세요');
  if(!date)return toast('// 날짜를 입력해주세요');
  const list=load('photos',[]);
  list.push({src:pDataURL,location:loc,date});
  save('photos',list);
  pDataURL=null;
  document.getElementById('ph-preview').style.display='none';
  document.getElementById('ph-file').value='';
  document.getElementById('ph-loc').value='';document.getElementById('ph-date').value='';
  renderPhotos();toast('// 사진이 추가됐어요');
}
function delPhoto(i){if(!confirm('삭제할까요?'))return;const list=load('photos',[]);list.splice(i,1);save('photos',list);renderPhotos();toast('// 삭제됐어요');}

// INSTAGRAM
function parseIGUrl(raw){
  const m=raw.match(/instagram\.com\/p\/([A-Za-z0-9_\-]+)/);
  if(!m)return null;
  const code=m[1];
  return{
    code,
    url:`https://www.instagram.com/p/${code}/`,
    embedUrl:`https://www.instagram.com/p/${code}/embed/captioned/`
  };
}
function previewIG(){
  const parsed=parseIGUrl(document.getElementById('ig-url').value.trim());
  if(!parsed)return toast('// 올바른 인스타 게시물 URL이 아니에요');
  const box=document.getElementById('ig-prev');
  box.style.display='block';
  box.innerHTML=`<iframe src="${parsed.embedUrl}" width="400" height="450" frameborder="0" scrolling="no" allowtransparency="true" style="max-width:100%;border:none;display:block;"></iframe>`;
  toast('// 미리보기 불러오는 중...');
}
function addIG(){
  const raw=document.getElementById('ig-url').value.trim();
  const parsed=parseIGUrl(raw);
  if(!parsed)return toast('// 올바른 인스타 게시물 URL이 아니에요');
  const list=load('insta_posts',[]);
  if(list.find(p=>p.code===parsed.code))return toast('// 이미 추가된 게시물이에요');
  list.unshift({...parsed,addedAt:new Date().toLocaleDateString('ko-KR')});
  save('insta_posts',list);
  document.getElementById('ig-url').value='';
  const box=document.getElementById('ig-prev');
  box.style.display='none';box.innerHTML='';
  renderIG();toast('// Instagram 게시물이 추가됐어요');
}
function renderIG(){
  const list=load('insta_posts',[]);
  const el=document.getElementById('ig-list');
  if(!list.length){el.innerHTML='<div class="empty-msg">// 등록된 Instagram 게시물이 없어요</div>';return;}
  el.innerHTML=list.map((p,i)=>`
    <div class="item">
      <div class="item-thumb-ig">IG</div>
      <div class="item-l">
        <div class="item-name">${p.url}</div>
        <div class="item-sub">추가일: ${p.addedAt}</div>
      </div>
      <div class="item-actions">
        <button class="btn btn-sm" onclick="window.open('${p.url}','_blank')" style="width:auto"><span>보기</span></button>
        <button class="btn btn-danger btn-sm" onclick="delIG(${i})"><span>삭제</span></button>
      </div>
    </div>`).join('');
}
function delIG(i){if(!confirm('삭제할까요?'))return;const list=load('insta_posts',[]);list.splice(i,1);save('insta_posts',list);renderIG();toast('// 삭제됐어요');}

// CONFIG
function loadConfig(){
  const cfg=load('config',{});
  if(cfg.github)document.getElementById('cfg-gh').value=cfg.github;
  if(cfg.instagram)document.getElementById('cfg-ig').value=cfg.instagram;
}
function saveConfig(){
  const cfg=load('config',{});
  cfg.github=document.getElementById('cfg-gh').value.trim();
  cfg.instagram=document.getElementById('cfg-ig').value.trim();
  save('config',cfg);toast('// 설정이 저장됐어요');
}

function loadAll(){loadAbout();loadConfig();renderProjects();renderSkills();renderPhotos();renderIG();}
</script>
</body>
